name: Build & Push API Docker Image

on:
  push:
    branches: [ "main" ]
    # Csak akkor fut le, ha a Backend mappában bármi módosul
    paths:
      - 'Backend/**'

jobs:
  build-and-dockerize-api:
    runs-on: ubuntu-latest
    
    # Beállítjuk az alapértelmezett mappát a .NET parancsokhoz
    defaults:
      run:
        working-directory: ./Backend/MyInventoryApi

    steps:
    - name: Kód letöltése (Checkout)
      uses: actions/checkout@v4

    - name: .NET 10 beállítása
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # A te projekted verziójához igazítva

    - name: Függőségek visszaállítása (Restore)
      run: dotnet restore

    - name: Kód fordítása (Build)
      # Release módban fordítunk, hogy optimalizált legyen
      run: dotnet build --no-restore -c Release

    # Opcionális, de erősen ajánlott: Tesztek futtatása (ha vannak)
    # - name: Egységtesztek futtatása
    #   run: dotnet test --no-build --verbosity normal

    # --- DOCKER KONTÉNERIZÁLÁS RÉSZ ---
    
    - name: Docker Buildx beállítása
      uses: docker/setup-buildx-action@v3

    - name: Bejelentkezés a Container Registry-be
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Docker image buildelése és pusholása
      uses: docker/build-push-action@v5
      with:
        # Itt mondjuk meg a Dockernek, hol a Dockerfile és a kód
        context: ./Backend/MyInventoryApi
        push: true
        # A backend image neve
        tags: te_felhasznaloneved/projekt_neve-api:latest