

HTML
<div class="container mt-5">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">Raktárkészlet kezelése</h2>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
      <h5 class="card-title m-0">Új termék hozzáadása</h5>
    </div>
    <div class="card-body">
   <form class="row g-3">
        <div class="col-md-5">
          <label for="productName" class="form-label">Terméknév</label>
          <input type="text" class="form-control" id="productName" name="name" 
                 [(ngModel)]="newProduct.name" placeholder="pl. Asztali számítógép">
        </div>
        
        <div class="col-md-3">
          <label for="productCategory" class="form-label">Kategória</label>
          <input type="text" class="form-control" id="productPrice" name=" category" 
                 [(ngModel)]="newProduct.category" placeholder="pl. Elektronika">
        </div>
        
        <div class="col-md-2">
          <label for="productQuantity" class="form-label">Készleten (db)</label>
          <input type="number" class="form-control" id="productQuantity" name="quantity" 
                 [(ngModel)]="newProduct.quantity" placeholder="0">
        </div>
        
        <div class="col-md-2 d-flex align-items-end">
          <button type="button" class="btn btn-success w-100" (click)="saveProduct()">
            Hozzáadás
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-striped table-hover align-middle m-0">
        <thead class="table-dark">
          <tr>
            <th>Terméknév</th>
            <th>Kategória</th>
            <th>Készleten</th>
          </tr>
        </thead>
        <tbody>
       @for (product of products; track product.id) {
            <tr>
              <td class="fw-bold">{{ product.name }}</td>
              <td>{{ product.category }} </td>
              <td>
                <span class="badge fs-6" 
                      [ngClass]="product.quantity < 5 ? 'bg-warning text-dark' : 'bg-info text-dark'">
                  {{ product.quantity }} db
                </span>
              </td>
              <td class="text-end pe-3">
               
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="text-center py-4 text-muted">
                Nincsenek termékek a listában.
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

</div>
